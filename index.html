<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radiossonda Brasil</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    header { background: #1d3557; color: white; padding: 20px; }
    .tabs { display: flex; gap: 10px; margin-top: 10px; }
    .tab-button {
      padding: 10px 16px;
      border: none;
      background: #457b9d;
      color: white;
      cursor: pointer;
      border-radius: 6px;
    }
    .tab-button:hover { background: #365d77; }
    .content {
      max-width: 1000px;
      margin: 20px auto;
      padding: 20px;
      background: white;
      border-radius: 10px;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Radiosonde stations in operation in Brazil</h1>
    <div class="tabs">
      <button class="tab-button" onclick="openTab('inicio')">Home</button>
      <button class="tab-button" onclick="openTab('mapa')">Map</button>
      <button class="tab-button" onclick="openTab('sobre')">About</button>
    </div>
  </header>

  <div class="content">
    <div id="inicio" class="tab-content active">
      <h2>Home</h2>
      <p>Welcome to the portal for operational radiosonde stations in Brazil.</p>
    </div>

    <div id="mapa" class="tab-content">
      <h2>Map</h2>
      <iframe src="mapa.html"></iframe>
    </div>

    <div id="sobre" class="tab-content">
      <h2>About</h2>
      <p>Site created for interactive visualization of radiosonde stations.</p>
    </div>
  </div>

  <script>
    function openTab(tabId) {
      const tabs = document.querySelectorAll('.tab-content');
      tabs.forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
    }
  </script>
</body>
</html>
